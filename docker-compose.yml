version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vc-postgres
    restart: always
    environment:
      POSTGRES_DB: vins_conversations
      POSTGRES_USER: vc_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vc_dev_2026}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vc_admin -d vins_conversations"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vc-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vc-api
    restart: always
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgres://vc_admin:${DB_PASSWORD:-vc_dev_2026}@postgres:5432/vins_conversations
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-vc_jwt_secret_dev_change_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-vc_refresh_secret_dev_change_in_prod}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      SITE_PUBLIC_URL: ${SITE_PUBLIC_URL:-http://31.97.57.103:8082}
      FRONTEND_URL: ${FRONTEND_URL:-http://31.97.57.103:5173}
      BASE_URL: ${BASE_URL:-http://31.97.57.103:5173}
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vc-frontend
    restart: always
    environment:
      VITE_API_URL: ${API_URL:-http://31.97.57.103:3001/api/v1}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/vite.config.js:/app/vite.config.js
    depends_on:
      - api
    command: npm run dev -- --host

  site-public:
    image: nginx:alpine
    container_name: vc-site-public
    restart: unless-stopped
    volumes:
      - ./site-public:/usr/share/nginx/html:ro
      - ./nginx/site-public.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8082:80"
    depends_on:
      - api

volumes:
  pgdata:
