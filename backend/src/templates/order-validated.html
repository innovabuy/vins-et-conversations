<h2>Commande validée !</h2>
<p>Bonjour {{NAME}},</p>
<p>Bonne nouvelle ! Votre commande <span class="highlight">{{ORDER_REF}}</span> a été validée par notre équipe.</p>
<div class="card">
  <div class="card-row"><span class="card-label">Référence</span><span class="card-value">{{ORDER_REF}}</span></div>
  <div class="card-row"><span class="card-label">Total TTC</span><span class="card-value">{{TOTAL_TTC}}</span></div>
  <div class="card-row"><span class="card-label">Statut</span><span class="card-value" style="color:#16a34a">Validée</span></div>
</div>
<p>La préparation de votre commande va débuter. Vous serez informé(e) lors de l'expédition.</p>
<p style="text-align:center"><a class="btn" href="{{DASHBOARD_URL}}">Suivre ma commande</a></p>
