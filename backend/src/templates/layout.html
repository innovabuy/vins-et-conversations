<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{SUBJECT}}</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f4f1ee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .wrapper { width: 100%; background-color: #f4f1ee; padding: 40px 0; }
    .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .header { background: linear-gradient(135deg, #7a1c3b 0%, #5a1430 100%); padding: 32px 40px; text-align: center; }
    .header h1 { color: #ffffff; font-size: 24px; margin: 0; font-weight: 700; letter-spacing: 0.5px; }
    .header p { color: rgba(255,255,255,0.8); font-size: 13px; margin: 6px 0 0; }
    .body { padding: 40px; color: #333333; line-height: 1.7; font-size: 15px; }
    .body h2 { color: #7a1c3b; font-size: 20px; margin: 0 0 16px; }
    .body p { margin: 0 0 16px; }
    .btn { display: inline-block; background: #7a1c3b; color: #ffffff !important; text-decoration: none; padding: 12px 32px; border-radius: 8px; font-weight: 600; font-size: 14px; margin: 8px 0; }
    .card { background: #f9f7f5; border-radius: 8px; padding: 20px; margin: 16px 0; }
    .card-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; }
    .card-row:last-child { border-bottom: none; }
    .card-label { color: #888; font-size: 13px; }
    .card-value { color: #333; font-weight: 600; font-size: 14px; }
    .footer { background: #faf8f6; padding: 24px 40px; text-align: center; border-top: 1px solid #eee; }
    .footer p { color: #999; font-size: 12px; margin: 4px 0; }
    .footer a { color: #7a1c3b; text-decoration: none; }
    table.items { width: 100%; border-collapse: collapse; margin: 16px 0; }
    table.items th { background: #7a1c3b; color: #fff; padding: 10px 12px; font-size: 12px; text-align: left; }
    table.items td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 13px; }
    table.items tr:last-child td { border-bottom: none; }
    .highlight { color: #7a1c3b; font-weight: 700; }
    .muted { color: #888; font-size: 13px; }
    @media (max-width: 620px) {
      .body { padding: 24px 20px; }
      .header { padding: 24px 20px; }
      .footer { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header">
        <h1>Vins &amp; Conversations</h1>
        <p>Nicolas Froment — Angers</p>
      </div>
      <div class="body">
        {{CONTENT}}
      </div>
      <div class="footer">
        <p>&copy; {{YEAR}} Vins &amp; Conversations</p>
        <p>Cet email a été envoyé automatiquement. <a href="{{BASE_URL}}">Accéder à la plateforme</a></p>
      </div>
    </div>
  </div>
</body>
</html>
