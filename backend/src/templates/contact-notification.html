<h2>Nouveau contact depuis le site</h2>
<div class="card">
  <div class="card-row"><span class="card-label">Nom</span><span class="card-value">{{NAME}}</span></div>
  <div class="card-row"><span class="card-label">Email</span><span class="card-value">{{EMAIL}}</span></div>
  <div class="card-row"><span class="card-label">Telephone</span><span class="card-value">{{PHONE}}</span></div>
  <div class="card-row"><span class="card-label">Entreprise</span><span class="card-value">{{COMPANY}}</span></div>
  <div class="card-row"><span class="card-label">Type</span><span class="card-value">{{TYPE_LABEL}}</span></div>
</div>
<h3 style="color:#7a1c3b;margin-top:20px;">Message</h3>
<div style="background:#f9f7f5;padding:16px;border-radius:8px;border-left:4px solid #7a1c3b;">
  <p style="margin:0;">{{MESSAGE}}</p>
</div>
