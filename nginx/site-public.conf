server {
    listen 80;
    server_name vinsetconversations.com www.vinsetconversations.com localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Cache agressif sur les assets statiques
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Video hero — permettre le streaming partiel
    location ~* \.mp4$ {
        mp4;
        mp4_buffer_size 1m;
        mp4_max_buffer_size 5m;
        expires 30d;
    }

    # Proxy vers l'API backend pour les appels AJAX (featured wines, wizard)
    location /api/ {
        proxy_pass http://vc-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy vers les uploads produits (images uploadées via admin)
    location /uploads/ {
        proxy_pass http://vc-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Proxy vers l'app React (ERP / Espace membre)
    location = /app {
        return 302 $scheme://$host:5173/login;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sécurité
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
}
